[tool.poetry]
name = "mindstride"
description = "EEG Motor Imagery Classification with EEGNet"
version = "0.1.0"
authors = ["Grzesiek"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.12"
torch = "^2.5.0"
numpy = "^1.26.0"
pandas = "^2.2.0"
scipy = "^1.14.0"
scikit-learn = "^1.5.0"
mne = "^1.9.0"
matplotlib = "^3.9.0"
seaborn = "^0.13.0"
tqdm = "^4.66.0"
jupyter = "^1.1.1"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
black = "^24.0.0"
flake8 = "^7.0.0"
mypy = "^1.8.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true